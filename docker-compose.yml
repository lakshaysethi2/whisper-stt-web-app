services:
  whisper-web:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-en}
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hf-cache:/cache
    tmpfs:
      - /tmp/whisper-stt:size=2G,uid=1000,gid=1000
    restart: unless-stopped

volumes:
  hf-cache:
